name: CI Pipeline Day 5

on:
  push:
    branches: 
      - main
  pull_request:

env:
  NODE_VERSION: 20

jobs:
  lint:
    uses: ./.github/workflows/reusable-node-setup.yml
    with:
      node-version: '20'
      command: 'lint'

  test-node-18:
    uses: ./.github/workflows/reusable-node-setup.yml
    with:
      node-version: '18'
      command: 'test'

  test-node-20:
    uses: ./.github/workflows/reusable-node-setup.yml
    with:
      node-version: '20'
      command: 'test'

  build:
    needs: [lint, test-node-18, test-node-20]
    uses: ./.github/workflows/reusable-node-setup.yml
    with:
      node-version: '20'
      command: 'build'
    secrets:
      DEMO_API_KEY: ${{ secrets.DEMO_API_KEY }}