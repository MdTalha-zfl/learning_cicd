name: CI Pipeline Day 5

on:
  push:
    branches: 
      - main
  pull_request:

env:
  NODE_VERSION: 20

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION}}
          key: 'npm'
      - run: npm install
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          key: 'npm'
      - run: npm install
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    env: 
      DEMO_API_KEY: ${{ secrets.DEMO_API_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION}}
          key: 'npm'
      - name: Install dependencies
        run: npm install

      - name: Debug secret (masked)
        run: echo $DEMO_API_KEY

      - name: Build project
        run: npm run build